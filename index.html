<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生生護動 - 招生說明會成效分析</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            background: white;
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        header h1 {
            color: #667eea;
            font-size: 32px;
            margin-bottom: 10px;
        }

        header p {
            color: #666;
            font-size: 16px;
        }

        .status {
            display: inline-block;
            margin-top: 15px;
            padding: 8px 15px;
            background: #e8f5e9;
            color: #2e7d32;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
        }

        .status.github {
            background: #f3e5f5;
            color: #7b1fa2;
        }

        .kpi-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .kpi-card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            text-align: center;
        }

        .kpi-value {
            font-size: 48px;
            font-weight: bold;
            color: #667eea;
            margin: 10px 0;
        }

        .kpi-label {
            color: #999;
            font-size: 14px;
            margin-bottom: 5px;
        }

        .kpi-detail {
            color: #667eea;
            font-size: 13px;
            margin-top: 8px;
        }

        .filters {
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        select {
            padding: 10px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
        }

        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .chart-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .event-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin: 30px 0;
        }

        .event-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .event-date {
            color: #667eea;
            font-weight: bold;
            font-size: 16px;
            margin-bottom: 5px;
        }

        .event-location {
            color: #999;
            font-size: 13px;
            margin-bottom: 15px;
        }

        .event-stats {
            display: flex;
            justify-content: space-around;
        }

        .stat {
            text-align: center;
        }

        .stat-number {
            font-size: 20px;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            font-size: 12px;
            color: #999;
            margin-top: 5px;
        }

        .data-table {
            width: 100%;
            background: white;
            border-collapse: collapse;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .data-table th {
            background: #667eea;
            color: white;
            padding: 15px;
            text-align: left;
            font-weight: 600;
        }

        .data-table td {
            padding: 12px 15px;
            border-bottom: 1px solid #eee;
        }

        .data-table tr:hover {
            background: #f5f5f5;
        }

        .rate-cell {
            text-align: center;
            color: #667eea;
            font-weight: 500;
        }

        footer {
            text-align: center;
            color: white;
            margin-top: 40px;
            padding: 20px;
        }

        .info-banner {
            background: rgba(255, 255, 255, 0.95);
            border-left: 4px solid #ff9800;
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 13px;
            color: #333;
        }

        .info-banner strong {
            color: #ff9800;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>生生護動 - 招生說明會成效分析</h1>
            <p>追蹤每場說明會的關鍵指標與轉換成效（數據來源：Airtable）</p>
            <span class="status github">📊 GitHub Pages 版本 - 靜態數據顯示</span>
        </header>

        <div class="info-banner">
            <strong>ℹ️ 說明：</strong> 此版本展示預計算數據。如需實時 Airtable 數據同步，請<a href="https://github.com/MKT-Melissa/aibizsafty-recruitment-dashboard#%E6%9C%AC%E5%9C%B0%E9%96%8B%E7%99%BC" style="color:#667eea; font-weight:bold;">點此查看本地開發設置</a>。
        </div>

        <div class="kpi-row">
            <div class="kpi-card">
                <div class="kpi-label">總報名人數</div>
                <div class="kpi-value" id="totalRegistration">-</div>
                <div class="kpi-detail" id="registrationDetails">-</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-label">MQL 轉換率</div>
                <div class="kpi-value" id="mqlRate">-</div>
                <div class="kpi-detail" id="mqlDetails">-</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-label">SQL 轉換率</div>
                <div class="kpi-value" id="sqlRate">-</div>
                <div class="kpi-detail" id="sqlDetails">-</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-label">平均合格率</div>
                <div class="kpi-value" id="qualificationRate">-</div>
                <div class="kpi-detail" id="qualificationDetails">-</div>
            </div>
        </div>

        <div class="filters">
            <label>篩選園區：</label>
            <select id="parkFilter" onchange="updateDashboard()">
                <option value="">全部園區</option>
                <option value="南軟">南軟</option>
                <option value="竹科">竹科</option>
                <option value="林口華亞">林口華亞</option>
                <option value="中科">中科</option>
            </select>
        </div>

        <div id="eventCards"></div>

        <div class="charts-grid">
            <div class="chart-card">
                <canvas id="registrationChart"></canvas>
            </div>
            <div class="chart-card">
                <canvas id="conversionChart"></canvas>
            </div>
            <div class="chart-card">
                <canvas id="parkComparisonChart"></canvas>
            </div>
            <div class="chart-card">
                <canvas id="rateChart"></canvas>
            </div>
        </div>

        <div style="background: white; padding: 20px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); margin-bottom: 30px; overflow-x: auto;">
            <h3 style="margin-bottom: 15px; color: #667eea;">詳細數據表</h3>
            <table class="data-table">
                <thead>
                    <tr>
                        <th>場次</th>
                        <th>日期</th>
                        <th>地點</th>
                        <th>報名</th>
                        <th>SQL</th>
                        <th>競品</th>
                        <th>合作夥伴</th>
                        <th>其他</th>
                        <th>MQL</th>
                        <th>MQL 轉換率</th>
                        <th>SQL 轉換率</th>
                    </tr>
                </thead>
                <tbody id="dataTable"></tbody>
            </table>
        </div>

        <footer>
            <p>數據最後更新：<span id="lastUpdate">-</span> | 生生護動 B2B 健康管理解決方案</p>
        </footer>
    </div>

    <script>
        // 說明會基本信息 - 預計算的靜態數據
        const events = [
            { 
                id: 1, 
                date: "2025/10/30", 
                location: "南軟", 
                registration: 43, 
                sql: 8,
                competitor: 5,
                partner: 3,
                other: 2,
                status: "completed" 
            },
            { 
                id: 2, 
                date: "2025/11/4", 
                location: "竹科", 
                registration: 33, 
                sql: 6,
                competitor: 4,
                partner: 2,
                other: 1,
                status: "completed" 
            },
            { 
                id: 3, 
                date: "2025/11/25", 
                location: "林口華亞", 
                registration: 22, 
                sql: 4,
                competitor: 3,
                partner: 2,
                other: 1,
                status: "completed" 
            },
            { 
                id: 4, 
                date: "2025/12/18", 
                location: "中科", 
                registration: 25, 
                sql: 5,
                competitor: 3,
                partner: 2,
                other: 1,
                status: "completed" 
            },
            { 
                id: 5, 
                date: "2026/3/25", 
                location: "南軟", 
                registration: 43, 
                sql: 9,
                competitor: 5,
                partner: 3,
                other: 2,
                status: "completed" 
            }
        ];

        // 計算 MQL
        events.forEach(event => {
            event.mql = event.sql + event.competitor + event.partner + event.other;
            event.unqualified = event.registration - event.mql;
        });

        let charts = {};
        const colors = {
            primary: '#667eea',
            mql: '#FF6B6B',
            sql: '#4ECDC4',
            success: '#45B7D1',
            warning: '#FFE66D'
        };

        function getFilteredEvents() {
            const park = document.getElementById('parkFilter').value;
            return park ? events.filter(e => e.location === park && e.status === 'completed') : events.filter(e => e.status === 'completed');
        }

        function calculateMetrics(filteredEvents) {
            const totalReg = filteredEvents.reduce((sum, e) => sum + e.registration, 0);
            const totalMql = filteredEvents.reduce((sum, e) => sum + e.mql, 0);
            const totalSql = filteredEvents.reduce((sum, e) => sum + e.sql, 0);
            const totalUnqualified = filteredEvents.reduce((sum, e) => sum + e.unqualified, 0);

            return {
                totalReg,
                mqlRate: totalReg > 0 ? (totalMql / totalReg * 100).toFixed(1) : 0,
                sqlRate: totalReg > 0 ? (totalSql / totalReg * 100).toFixed(1) : 0,
                qualificationRate: totalReg > 0 ? ((totalReg - totalUnqualified) / totalReg * 100).toFixed(1) : 0,
                totalMql,
                totalSql,
                totalUnqualified
            };
        }

        function updateKPIs() {
            const filtered = getFilteredEvents();
            const metrics = calculateMetrics(filtered);

            document.getElementById('totalRegistration').textContent = metrics.totalReg;
            document.getElementById('registrationDetails').textContent = metrics.totalReg + ' 位報名';
            document.getElementById('mqlRate').textContent = metrics.mqlRate + '%';
            document.getElementById('mqlDetails').textContent = metrics.totalMql + ' 位導線';
            document.getElementById('sqlRate').textContent = metrics.sqlRate + '%';
            document.getElementById('sqlDetails').textContent = metrics.totalSql + ' 位銷售機會';
            document.getElementById('qualificationRate').textContent = metrics.qualificationRate + '%';
            document.getElementById('qualificationDetails').textContent = (metrics.totalReg - metrics.totalUnqualified) + ' 位合格';
        }

        function renderEventCards() {
            const completedEvents = events.filter(e => e.status === 'completed');
            const html = completedEvents.map(event => `
                <div class="event-card">
                    <div class="event-date">${event.date}</div>
                    <div class="event-location">${event.location}</div>
                    <div class="event-stats">
                        <div class="stat">
                            <div class="stat-number">${event.registration}</div>
                            <div class="stat-label">報名</div>
                        </div>
                        <div class="stat">
                            <div class="stat-number" style="color: #FF6B6B;">${event.mql}</div>
                            <div class="stat-label">MQL</div>
                        </div>
                        <div class="stat">
                            <div class="stat-number" style="color: #4ECDC4;">${event.sql}</div>
                            <div class="stat-label">SQL</div>
                        </div>
                        <div class="stat">
                            <div class="stat-number" style="color: #FFE66D;">${event.registration > 0 ? ((event.registration - event.unqualified) / event.registration * 100).toFixed(0) : 0}%</div>
                            <div class="stat-label">合格率</div>
                        </div>
                    </div>
                </div>
            `).join('');

            document.getElementById('eventCards').innerHTML = html;
        }

        function renderDataTable() {
            const completedEvents = events.filter(e => e.status === 'completed');
            const metrics = calculateMetrics(completedEvents);

            let html = completedEvents.map(event => `
                <tr>
                    <td>${event.id}</td>
                    <td>${event.date}</td>
                    <td>${event.location}</td>
                    <td>${event.registration}</td>
                    <td>${event.sql}</td>
                    <td>${event.competitor}</td>
                    <td>${event.partner}</td>
                    <td>${event.other}</td>
                    <td>${event.mql}</td>
                    <td class="rate-cell">${event.registration > 0 ? (event.mql / event.registration * 100).toFixed(1) : 0}%</td>
                    <td class="rate-cell">${event.registration > 0 ? (event.sql / event.registration * 100).toFixed(1) : 0}%</td>
                </tr>
            `).join('');

            html += `
                <tr style="background: #f9f9f9; font-weight: bold;">
                    <td colspan="3">總計</td>
                    <td>${metrics.totalReg}</td>
                    <td>${metrics.totalSql}</td>
                    <td>-</td>
                    <td>-</td>
                    <td>-</td>
                    <td>${metrics.totalMql}</td>
                    <td class="rate-cell">${metrics.mqlRate}%</td>
                    <td class="rate-cell">${metrics.sqlRate}%</td>
                </tr>
            `;

            document.getElementById('dataTable').innerHTML = html;
        }

        function updateCharts() {
            const filtered = getFilteredEvents();

            // 報名趨勢
            if (charts.registration) charts.registration.destroy();
            charts.registration = new Chart(document.getElementById('registrationChart'), {
                type: 'line',
                data: {
                    labels: filtered.map(e => e.date),
                    datasets: [{
                        label: '報名人數',
                        data: filtered.map(e => e.registration),
                        borderColor: colors.primary,
                        backgroundColor: 'rgba(102, 126, 234, 0.1)',
                        borderWidth: 3,
                        fill: true,
                        tension: 0.4,
                        pointRadius: 6,
                        pointBackgroundColor: colors.primary,
                        pointBorderColor: '#fff',
                        pointBorderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { display: false }, title: { display: true, text: '說明會報名趨勢' } },
                    scales: { y: { beginAtZero: true } }
                }
            });

            // MQL/SQL 轉換
            if (charts.conversion) charts.conversion.destroy();
            charts.conversion = new Chart(document.getElementById('conversionChart'), {
                type: 'bar',
                data: {
                    labels: filtered.map(e => e.date),
                    datasets: [
                        {
                            label: 'MQL',
                            data: filtered.map(e => e.mql),
                            backgroundColor: colors.mql
                        },
                        {
                            label: 'SQL',
                            data: filtered.map(e => e.sql),
                            backgroundColor: colors.sql
                        }
                    ]
                },
                options: {
                    responsive: true,
                    plugins: { title: { display: true, text: 'MQL/SQL 轉換對比' } },
                    scales: { y: { beginAtZero: true } }
                }
            });

            // 園區對比
            const parkData = {};
            filtered.forEach(e => {
                if (!parkData[e.location]) {
                    parkData[e.location] = { registration: 0, mql: 0, sql: 0 };
                }
                parkData[e.location].registration += e.registration;
                parkData[e.location].mql += e.mql;
                parkData[e.location].sql += e.sql;
            });

            if (charts.park) charts.park.destroy();
            charts.park = new Chart(document.getElementById('parkComparisonChart'), {
                type: 'doughnut',
                data: {
                    labels: Object.keys(parkData),
                    datasets: [{
                        data: Object.values(parkData).map(d => d.registration),
                        backgroundColor: ['#667eea', '#FF6B6B', '#4ECDC4', '#FFE66D', '#95E1D3']
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { position: 'bottom' }, title: { display: true, text: '園區報名佔比' } }
                }
            });

            // 轉換率趨勢
            if (charts.rate) charts.rate.destroy();
            charts.rate = new Chart(document.getElementById('rateChart'), {
                type: 'line',
                data: {
                    labels: filtered.map(e => e.date),
                    datasets: [
                        {
                            label: 'MQL轉換率',
                            data: filtered.map(e => e.registration > 0 ? (e.mql / e.registration * 100).toFixed(1) : 0),
                            borderColor: colors.mql,
                            backgroundColor: 'rgba(255, 107, 107, 0.1)',
                            borderWidth: 2,
                            tension: 0.4,
                            pointRadius: 5
                        },
                        {
                            label: 'SQL轉換率',
                            data: filtered.map(e => e.registration > 0 ? (e.sql / e.registration * 100).toFixed(1) : 0),
                            borderColor: colors.sql,
                            backgroundColor: 'rgba(78, 205, 196, 0.1)',
                            borderWidth: 2,
                            tension: 0.4,
                            pointRadius: 5
                        }
                    ]
                },
                options: {
                    responsive: true,
                    plugins: { title: { display: true, text: '轉換率趨勢' } },
                    scales: { y: { beginAtZero: true } }
                }
            });
        }

        function updateDashboard() {
            updateKPIs();
            updateCharts();
            renderDataTable();
        }

        // 初始化
        document.getElementById('lastUpdate').textContent = new Date().toLocaleString('zh-TW');
        renderEventCards();
        updateDashboard();
    </script>
</body>
</html>
